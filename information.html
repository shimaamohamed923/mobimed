<!DOCTYPE html>
<html class="no-js">

    <head>
        <title>Mobi Med</title>
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
        <link rel="icon" href="images/favicon.png" type="image/png">

        <link rel="stylesheet" href="css/style.css">

    </head>

    <body>
        <div class="content">
            <header id="header2" class="h-shaodw clearfix"></header>
            <!--==============================Start Header ==============================-->

            <!--==============================End Header ==============================-->

            <!--==============================Start Discussions Section==============================-->
            <section class="info-form">
                <div class="content__section">
                    <div class="container-xxl">
                        <div class="row justify-content-center">
                            <div class="col-xl-10">
                                <div class="row">
                                    <div class="colmd-5 col-lg-6">
                                        <div class="c__card c-p bg-main">
                                            <div class="img-user rounded-circle">
                                                <img src="images/userimg.png">
                                            </div>
                                            <div class="desc__card text-center">
                                                <h5 class="main-color w-meduim">
                                                    Doctor Shaimaa Abo El Maaty
                                                </h5>
                                                <div class="c-grey"> <span> Dermatology and laser Consultant</span>
                                                </div>
                                                <hr class="my-4">
                                                <div class="d-flex align-items-center justify-content-center txt-sm w-meduim c-black time-reserve">
                                                    <span><img class="me-2" src="images/ico-calendar.svg"> Today 16
                                                        February -
                                                        3:10
                                                        PM ,
                                                        Appointment reservation</span>
                                                </div>
                                            </div>
                                        </div>


                                    </div>
                                    <div class="colmd-7 col-lg-6">
                                        <div class="box">
                                            <div class="wrapper__box">
                                                <div class="title__box">
                                                    <h5 class="text-center">
                                                        Enter your information

                                                    </h5>
                                                </div>
                                                <div class="d-flex justify-content-between">
                                                    <button class="btn btn-social btn-fb">
                                                        <svg xmlns="http://www.w3.org/2000/svg" width="7" height="14">
                                                            <path d="M1.513 2.711v1.928H.004v2.36h1.513v7h3.108v-7h2.079s.2-1.13.29-2.366H4.63V3.019a.716.716 0 01.674-.565h1.7V-.001h-2.3c-3.268 0-3.191 2.36-3.191 2.712z" fill="#fff"/>
                                                        </svg> Facebook
                                                    </button>
                                                    <button class="btn btn-social btn-gmail">
                                                        <svg data-name="mail-black-envelope-symbol (2)" xmlns="http://www.w3.org/2000/svg" width="16.123" height="12.092">
                                                            <path data-name="Path 230" d="M16.123 10.077a2 2 0 01-.259.969l-5.091-5.697 5.036-4.4a2 2 0 01.314 1.071v8.061zM8.061 6.385L15.068.249a1.99 1.99 0 00-.961-.254H2.015a1.983 1.983 0 00-.96.254zm1.953-.371l-1.622 1.42a.506.506 0 01-.663 0l-1.622-1.42-5.154 5.768a1.991 1.991 0 001.063.31h12.091a1.991 1.991 0 001.063-.31zM.314.949A2 2 0 000 2.015v8.061a1.991 1.991 0 00.259.969l5.09-5.696z" fill="#fff"/>
                                                        </svg>
                                                        Gmail
                                                    </button>
                                                </div>
                                                <div class="cs-hr text-center">
                                                    <span class="main-color"> Or </span>
                                                </div>
                                                <form>
                                                    <div class="floated-input mb-5">
                                                        <label> Full patient name </label>
                                                        <input class="form-control user" placeholder="name">
                                                    </div>
                                                    <div class="floated-input mb-5">
                                                        <label> Mobile Number </label>
                                                        <div>
                                                            <input class="form-control phone" type="tel" id="phone" placeholder="Mobile number">

                                                        </div>

                                                    </div>
                                                    <div class="floated-input mb-5">
                                                        <label> Email address </label>
                                                        <input class="form-control mail" placeholder="Email">
                                                    </div>


                                                    <div class="d-flex justify-content-between mb-5">
                                                        <button class="btn btn-solid btn-book">
                                                            Book
                                                        </button>
                                                        <button class="btn btn-cancel btn-outline">
                                                            Cancel
                                                        </button>
                                                    </div>
                                                </form>

                                            </div>


                                        </div>


                                    </div>
                                </div>
                            </div>


                        </div>


                    </div>
                </div>
            </section>
            <!--==============================End Discussions Section==============================-->

            <footer id="footer">
            </footer>

        </div>
        <script src="js/all.js"></script>
        <script>
            $(function () {
                $("#header2").load("header.html");
                $("#footer").load("footer.html");

            });
        </script>
    </body>

</html>
