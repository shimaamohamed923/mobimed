<!DOCTYPE html>
<html class="no-js" dir="rtl">

    <head>
        <title>Mobi Med</title>
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
        <link rel="icon" href="images/favicon.png" type="image/png">

        <link rel="stylesheet" href="../css/style.css">
        <link rel="stylesheet" href="../css/style-ar.css">
    </head>

    <body class="rtl">
        <div class="content">
            <header id="header2" class="h-shaodw clearfix"></header>
            <!--==============================Start Header ==============================-->
            <!--==============================End Header ==============================-->
            <!--==============================Start Discussions Section==============================-->
            <section class="signup-form">
                <div class="content__section">
                    <div class="container-xxl">
                        <div class="row justify-content-center">
                            <div class="col-12 col-md-10 col-lg-8">
                                <div class="box">
                                    <div class="wrapper__box box-lg">
                                        <div class="title__box">
                                            <h5 class="text-center">
                                                Sign up now
                                            </h5>
                                        </div>
                                        <div class="d-flex justify-content-center">
                                            <button class="btn btn-social btn-fb">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="7" height="14">
                                                    <path
                                                        d="M1.513 2.711v1.928H.004v2.36h1.513v7h3.108v-7h2.079s.2-1.13.29-2.366H4.63V3.019a.716.716 0 01.674-.565h1.7V-.001h-2.3c-3.268 0-3.191 2.36-3.191 2.712z"
                                                        fill="#fff" />
                                                </svg> Facebook
                                            </button>
                                            <button class="btn btn-social btn-gmail">
                                                <svg data-name="mail-black-envelope-symbol (2)"
                                                    xmlns="http://www.w3.org/2000/svg" width="16.123" height="12.092">
                                                    <path data-name="Path 230"
                                                        d="M16.123 10.077a2 2 0 01-.259.969l-5.091-5.697 5.036-4.4a2 2 0 01.314 1.071v8.061zM8.061 6.385L15.068.249a1.99 1.99 0 00-.961-.254H2.015a1.983 1.983 0 00-.96.254zm1.953-.371l-1.622 1.42a.506.506 0 01-.663 0l-1.622-1.42-5.154 5.768a1.991 1.991 0 001.063.31h12.091a1.991 1.991 0 001.063-.31zM.314.949A2 2 0 000 2.015v8.061a1.991 1.991 0 00.259.969l5.09-5.696z"
                                                        fill="#fff" />
                                                </svg>
                                                Gmail
                                            </button>
                                        </div>
                                        <div class="cs-hr text-center">
                                            <span class="main-color"> Or </span>
                                        </div>
                                        <form>
                                            <div class="mb-4">
                                                <label> Your name </label>
                                                <input class="form-control" placeholder="First and last name">
                                            </div>
                                            <div class="mb-4">
                                                <label> Mobile Number </label>
                                                <div>
                                                    <input class="form-control" type="tel" id="phone"
                                                        placeholder="Mobile number">

                                                </div>

                                            </div>
                                            <div class="mb-4">
                                                <label> Email Address </label>
                                                <input class="form-control" placeholder="examole@domain.com">
                                            </div>
                                            <div class="d-flex align-items-center mb-4">
                                                <label class="me-4"> Gender </label>
                                                <div class="gender-options">
                                                    <div class="option me-3 me-sm-5 male">
                                                        <i>
                                                            <svg data-name="Page 1" xmlns="http://www.w3.org/2000/svg"
                                                                width="25.907" height="25.927">
                                                                <defs>
                                                                    <clipPath id="a">
                                                                        <path data-name="Clip 2"
                                                                            d="M0 0h25.907v25.927H0" fill="none" />
                                                                    </clipPath>
                                                                </defs>
                                                                <path data-name="Clip 2" d="M0 0h25.907v25.927H0"
                                                                    fill="none" />
                                                                <g data-name="Page 1" clip-path="url(#a)">
                                                                    <path data-name="Fill 1"
                                                                        d="M11.2 25.927a11.018 11.018 0 01-7.839-3.207A11.221 11.221 0 017.045 4.3a11 11 0 014.112-.8 11.736 11.736 0 011.682.124 11.026 11.026 0 015.32 2.312l1.719-1.72 1.731-1.731h-1.038a4.575 4.575 0 01-.626-.032A1.224 1.224 0 0118.923 1.1 1.218 1.218 0 0120.116 0h4.6a1.184 1.184 0 011.172 1.082c.027.339.025.686.023 1.022v1.04c0 .879 0 1.788-.021 2.682a1.2 1.2 0 01-1.219 1.162h-.032a1.232 1.232 0 01-1.206-1.242v-.921-.459l-2.491 2.485-.933.935a11.032 11.032 0 012.209 8.894 10.884 10.884 0 01-4.1 6.849 11.152 11.152 0 01-6.918 2.398zM11.187 5.99a8.686 8.686 0 10.017 0z"
                                                                        fill="#b1bfcd" />
                                                                </g>
                                                            </svg>
                                                        </i>
                                                        Male
                                                    </div>
                                                    <div class="option female">
                                                        <i>
                                                            <svg xmlns="http://www.w3.org/2000/svg" width="21.548"
                                                                height="30.33" viewBox="0 0 21.548 30.33">
                                                                <path id="Page_1" data-name="Page 1"
                                                                    d="M10.77,30.33a1.188,1.188,0,0,1-1.182-1.216c-.006-.336,0-.676,0-1.005q0-.224,0-.447V27.39H8.045A1.195,1.195,0,1,1,8,25c.166,0,.333-.005.5-.005l.408,0,.425,0h.252v-.466q0-.352,0-.7V23.8c0-.66,0-1.34.007-2.01,0-.221-.056-.288-.291-.324a10.552,10.552,0,0,1-8-5.575A10.711,10.711,0,0,1,2.9,3.452,10.569,10.569,0,0,1,9.432.09,10.671,10.671,0,0,1,10.808,0,10.788,10.788,0,0,1,12.16,21.485c-.11.014-.188.035-.188.177,0,.822,0,1.644,0,2.482V25h1c.187,0,.433,0,.682.014a1.189,1.189,0,0,1,.177,2.352,1.412,1.412,0,0,1-.3.025h-.142c-.466,0-.931,0-1.419,0v.5c0,.415,0,.807,0,1.206a1.189,1.189,0,0,1-.895,1.2A1.3,1.3,0,0,1,10.77,30.33Zm.068-27.936v0A8.42,8.42,0,0,0,4.863,4.844,8.308,8.308,0,0,0,2.4,10.782a8.408,8.408,0,0,0,8.379,8.408A8.4,8.4,0,0,0,10.842,2.4Z"
                                                                    fill="#b1bfcd" />
                                                            </svg>

                                                        </i>
                                                        Female

                                                    </div>

                                                </div>
                                            </div>
                                            <div class="mb-4">
                                                <label> Birth Date </label>
                                                <input class="form-control datepicker bg-transparent"
                                                    data-toggle="datepicker" rel="datepicker" readonly="true"
                                                    placeholder="date">
                                            </div>
                                            <div class="mb-3">
                                                <label> Password </label>
                                                <input class="form-control" placeholder="Password">
                                            </div>
                                            <div class="mb-4">
                                                <span class="c-grey fw-bold txt-sm"> By signing up you agree to our <a
                                                        href="#" class="main-color text-decoration-underline">Terms Of
                                                        Use</a></span>
                                            </div>
                                            <button class="btn btn-solid btn-form w-100 fw-bold mb-5"> Sign up </button>
                                        </form>
                                        <div class="text-center">
                                            <span class="c-grey fw-bold"> Already Registered in mobimed? <a href="#"
                                                    class="main-color text-decoration-underline">login</a></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
            <!--==============================End Discussions Section==============================-->
            <footer id="footer">
            </footer>
            <!--==============================End Footer ==============================-->

        </div>
        <script src="../js/all.js"></script>
        <script>
            $(function () {
                $("#header2").load("headerar.html");
                $("#footer").load("footerar.html");
            });
        </script>
    </body>

</html>
