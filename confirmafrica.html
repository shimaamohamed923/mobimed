<!DOCTYPE html>

    <head>

        <link rel="stylesheet" href="css/style.css">

        <div class="content main-bg">

            <header id="header2" class="h-shaodw clearfix"></header>
            <!--==============================End Header ==============================-->

                                    احجز الآن

                                        <div class="img-card">
                                            <div class="doctor-img">
                                                <img classs="rounded-circle" src="images/usr-img.png">
                                            </div>
                                        </div>
                                        <div class="doctor__info text-start ms-2">
                                            <h6 class="main-color w-meduim"> عيادة الجمال</h6>
                                            <div>
                                                <span class="dept">
                                                    دكتور اطفال
                                                </span>
                                            </div>


                                        </div>
                                    </div>
                                    <div class="title text-center w-meduim">

                                            احجز الان
                                        </h6>
                                        <h6 class="main-color mb-0">
                                            فحص
                                        </h6>
                                    </div>
                                    <div>

                                        </i>

                                            مدة الانتظار:15 دقائق

                                    </div>



                                </div>




                                <div class="bookdetail">

                                            الحضور</span>
                                    </div>
                                </div>

                            </div>




                        </div>
                        <div class="col-lg-6">

                            <div class="doctor__data">

                                <div class="sticky__box booking-card">
                                    <h5 class="main-color">
                                        Booking Information
                                    </h5>

                                    <div class="bookdetail fess-time d-flex justify-content-between text-center">
                                        <form class="form-bookdetail">

                                                    </svg> </label>
                                                <input class="form-control" placeholder="اسم المريض">

                                            </div>


                                        </form>


                                    </div>
                                    <div class="bookdetail text-center c-grey">
                                        <textarea id="message-text" class="form-control">الشكوى</textarea>
                                    </div>
                                    <div class="bookdetail">
                                        <div class="d-flex align-items-center justify-content-center">
                                            <img class="ico-calendar" src="images/appointment.svg">

                                            </div>
                                        </div>


                                    </div>
                                    <div class="bookdetail">

                                            <div class="d-flex align-items-center justify-content-center">

                                    </div>

                                            الغاء

                                </div>

                            </div>

                        </div>


                    </div>
                </div>

            </section>

            </footer>

            $(function () {
                $("#header2").load("header.html");
