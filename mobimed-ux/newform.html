<!DOCTYPE html>
<html class="no-js">

    <head>
        <title>Mobi Med</title>
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
        <link rel="icon" href="images/favicon.png" type="image/png">

        <link rel="stylesheet" href="css/style.css">

    </head>

    <body>
        <div class="content">
            <header id="header2" class="h-shaodw clearfix"></header>
            <!--==============================Start Header ==============================-->

            <!--==============================End Header ==============================-->

            <!--==============================Start Discussions Section==============================-->
            <section class="new-form">
                <div class="content__section">

                    <div class="cover-form">
                        <img src="images/coverform.jpg" />
                        <div class="desc">
                            <h2 class="w-meduim">
                                Free medical advice
                            </h2>
                            <p>Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy
                                eirmod tempor invidunt ut labore et dolore
                                magna aliquyam erat, sed diam voluptua. At</p>
                        </div>
                    </div>
                    <div class="wrapper-form">
                        <div class="container-xxl">
                            <div class="row justify-content-center">
                                <div class="col-md-10 py-5">
                                    <h5 class="mb-4 w-meduim"> Enter your information
                                    </h5>
                                    <form class="newform">
                                        <div class="row">
                                            <div class="col-md-6  mb-4">
                                                <label> Name </label>
                                                <input class="form-control" placeholder="Enter Here" />
                                            </div>
                                            <div class="col-md-6  mb-4">
                                                <label> Phone Number </label>
                                                <input class="form-control" placeholder="Enter Here" />
                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6  mb-4">
                                                <label>
                                                    Specialist
                                                </label>
                                                <select id="inputState" class="form-select">
                                                    <option selected>Select Here..</option>
                                                    <option>...</option>
                                                </select>
                                            </div>
                                            <div class="col-md-6  mb-4">
                                                <label> Question with multiple choices ?</label>
                                                <div>
                                                    <select id="choices-multiple-remove-button" multiple>
                                                        <option value="HTML">HTML</option>
                                                        <option value="Jquery">Jquery</option>
                                                        <option value="CSS">CSS</option>
                                                        <option value="Bootstrap 3">Bootstrap 3</option>
                                                        <option value="Bootstrap 4">Bootstrap 4</option>
                                                        <option value="Java">Java</option>
                                                        <option value="Javascript">Javascript</option>
                                                        <option value="Angular">Angular</option>
                                                        <option value="Python">Python</option>
                                                        <option value="Hybris">Hybris</option>
                                                        <option value="SQL">SQL</option>
                                                        <option value="NOSQL">NOSQL</option>
                                                        <option value="NodeJS">NodeJS</option>
                                                    </select>
                                                </div>

                                            </div>
                                        </div>
                                        <div class="row">
                                            <div class="col-md-6  mb-5">
                                                <label> Radio Button </label>
                                                <div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio"
                                                            name="inlineRadioOptions" id="Male" value="option1">
                                                        <label class="form-check-label" for="Male">Male</label>
                                                    </div>
                                                    <div class="form-check form-check-inline">
                                                        <input class="form-check-input" type="radio"
                                                            name="inlineRadioOptions" id="Female" value="option2">
                                                        <label class="form-check-label" for="Female">Female</label>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="col-md-6  mb-5">
                                                <label> Text box </label>
                                                <input class="form-control" placeholder="Enter Here" />

                                            </div>
                                        </div>
                                        <div class="row mb-4">
                                            <div class="col-12">

                                                <button class="btn btn-solid btn-form w-100 fw-bold mb-5"> SUBMIT
                                                </button>

                                            </div>
                                        </div>


                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>




                </div>
            </section>
            <!--==============================End Discussions Section==============================-->

            <footer id="footer">
            </footer>

        </div>
        <script src="js/all.js"></script>
        <script>
            $(function () {
                $("#header2").load("header.html");
                $("#footer").load("footer.html");

            });
        </script>
    </body>

</html>
